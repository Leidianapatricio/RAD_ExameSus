{% extends 'base.html' %}

{% block content %}
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card card-examesus p-4">
                <div class="card-body">
                    <div class="icon-circle mb-4">
                        <i class="bi bi-person"></i>
                    </div>

                    <h2 class="text-center fw-bold">Bem-vindo ao ExameSUS</h2>
                    <p class="text-center text-muted">Acesse suas informações de exames do SUS</p>

                    <ul class="nav nav-pills nav-fill bg-light rounded-3 p-1 my-4" id="loginTabs">
                        <li class="nav-item">
                            <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#cidadao">
                                Cidadão
                            </button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" data-bs-toggle="pill" data-bs-target="#profissional">
                                Profissional
                            </button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" data-bs-toggle="pill" data-bs-target="#admin">
                                Admin
                            </button>
                        </li>
                    </ul>

                    <div class="tab-content">
                        <div class="tab-pane fade show active" id="cidadao">
                            <form method="get" action="{% url 'dashboard_cidadao' %}">
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">CPF ou Cartão SUS</label>
                                    <input type="text" class="form-control form-control-lg" placeholder="Digite seu CPF ou Cartão SUS">
                                    <div class="form-text">Você pode usar qualquer um dos dois documentos para acessar.</div>
                                </div>
                                <button class="btn btn-examesus btn-lg w-100">Acessar Sistema</button>
                            </form>
                        </div>

                        <div class="tab-pane fade" id="profissional">
                            <form method="get" action="{% url 'dashboard_profissional' %}">
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">ID Profissional</label>
                                    <input type="text" class="form-control form-control-lg" placeholder="Digite seu ID profissional">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Nome Completo</label>
                                    <input type="text" class="form-control form-control-lg" placeholder="Digite seu nome completo">
                                </div>

                                <div class="mb-4">
                                    <label class="form-label fw-semibold">Unidade de Saúde</label>
                                    <select class="form-select form-select-lg">
                                        <option>Selecione sua unidade</option>
                                        <option>UBS Centro</option>
                                        <option>UBS Vila Nova</option>
                                        <option>Hospital Municipal</option>
                                        <option>Policlínica Regional</option>
                                    </select>
                                </div>

                                <button class="btn btn-examesus btn-lg w-100">Acessar como Profissional</button>
                            </form>
                        </div>

                        <div class="tab-pane fade" id="admin">
                            <form method="get" action="{% url 'dashboard_admin' %}">
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Usuário</label>
                                    <input type="text" class="form-control form-control-lg" placeholder="Digite seu usuário admin">
                                </div>

                                <div class="mb-4">
                                    <label class="form-label fw-semibold">Senha</label>
                                    <input type="password" class="form-control form-control-lg" placeholder="Digite sua senha">
                                </div>

                                <button class="btn btn-examesus btn-lg w-100">Acessar como Admin</button>
                            </form>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
