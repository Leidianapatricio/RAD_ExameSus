{% extends 'base.html' %}

{% block content %}
<section class="container py-4">

    <div class="card card-examesus p-4 mb-4">
        <h2 class="fw-bold mb-1">Novo Usuário</h2>
        <p class="text-muted mb-0">
            Cadastre um novo cidadão no ExameSUS.
        </p>
    </div>

    <div class="card card-examesus p-4">

        <form method="post">
            {% csrf_token %}

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">
                        Nome Completo
                    </label>

                    <input
                        type="text"
                        name="nome"
                        class="form-control"
                        placeholder="Digite o nome completo"
                        required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">
                        CPF
                    </label>

                    <input
                        type="text"
                        name="cpf"
                        class="form-control"
                        placeholder="000.000.000-00"
                        required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">
                        Cartão SUS
                    </label>

                    <input
                        type="text"
                        name="cartao_sus"
                        class="form-control"
                        placeholder="Número do Cartão SUS">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">
                        Sexo
                    </label>

                    <select
                        name="sexo"
                        class="form-select"
                        required>

                        <option value="">Selecione...</option>
                        <option value="F">Feminino</option>
                        <option value="M">Masculino</option>
                        <option value="O">Outro</option>

                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">
                        Telefone
                    </label>

                    <input
                        type="text"
                        name="telefone"
                        class="form-control"
                        placeholder="(83) 99999-9999">
                </div>

                <div class="col-md-6 mb-4">
                    <label class="form-label fw-semibold">
                        E-mail
                    </label>

                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        placeholder="usuario@email.com">
                </div>

            </div>

            <hr>

            <div class="d-flex justify-content-end gap-2">

                <a href="{% url 'usuarios:listar' %}"
                   class="btn btn-outline-secondary">
                    Cancelar
                </a>

                <button type="submit"
                        class="btn btn-examesus">
                    <i class="bi bi-check-circle"></i>
                    Salvar Usuário
                </button>

            </div>

        </form>

    </div>

</section>
{% endblock %}
