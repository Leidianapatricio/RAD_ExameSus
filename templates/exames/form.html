{% extends 'base.html' %}

{% block content %}
<section class="container py-4">

    <div class="card card-examesus p-4 mb-4">
        <h2 class="fw-bold mb-1">{{ titulo }}</h2>
        <p class="text-muted mb-0">{{ descricao }}</p>
    </div>

    <div class="card card-examesus p-4">
        <form method="post">
            {% csrf_token %}

            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">{{ field.label }}</label>
                    {{ field }}

                    {% if field.errors %}
                        <div class="text-danger small mt-1">
                            {{ field.errors }}
                        </div>
                    {% endif %}
                </div>
            {% endfor %}

            <hr>

            <div class="d-flex justify-content-end gap-2">
                <a href="{% url 'exames:listar_tipos' %}" class="btn btn-outline-secondary">
                    Cancelar
                </a>

                <button class="btn btn-examesus">
                    <i class="bi bi-check-circle"></i> Salvar
                </button>
            </div>
        </form>
    </div>

</section>
{% endblock %}
