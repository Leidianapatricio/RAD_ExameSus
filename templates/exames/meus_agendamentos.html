{% extends 'base.html' %}

{% block content %}

<section class="container py-4">

<div class="card card-examesus p-4">

<h2 class="fw-bold mb-4">
Meus Agendamentos
</h2>

<table class="table table-hover">

<thead>

<tr>

<th>Tipo</th>
<th>Data</th>
<th>Unidade</th>

</tr>

</thead>

<tbody>

{% for agendamento in agendamentos %}

<tr>

<td>{{ agendamento.tipo_exame.nome }}</td>

<td>{{ agendamento.data }}</td>

<td>{{ agendamento.unidade.nome }}</td>

</tr>

{% empty %}

<tr>

<td colspan="3"
class="text-center text-muted">

Nenhum agendamento encontrado.

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</section>

{% endblock %}
